openapi: 3.0.3
info:
  title: Task Manager V2 API
  version: 1.0.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  description: |
    HTTP API for Task Manager V2 (MVP). Base path `/api/v1`.

    **Auth:** MVP may use either (a) `Authorization: Bearer <access_token>` or (b) an HTTP-only
    session cookie. This spec uses bearer JWT for documentation clarity; implementations should
    document the chosen mode in deployment README and mirror it in `securitySchemes`.

servers:
  - url: https://api.example.com
    description: Production (example)
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Auth
  - name: Me
  - name: Projects
  - name: Tasks
  - name: Tags
  - name: Search
  - name: Health

security:
  - bearerAuth: []

paths:
  /healthz:
    get:
      tags: [Health]
      summary: Liveness probe
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /readyz:
    get:
      tags: [Health]
      summary: Readiness (database reachable)
      security: []
      responses:
        '200':
          description: Ready
        '503':
          description: Not ready

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Sign in
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Sign out (revoke refresh token / clear session)
      responses:
        '204':
          description: No content

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Issue a new access token using refresh token
      security: []
      description: Required if using JWT access + refresh; omit if using cookie sessions only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          description: Invalid or expired refresh
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/me:
    get:
      tags: [Me]
      summary: Current user profile
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    patch:
      tags: [Me]
      summary: Update profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPatch'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /api/v1/projects:
    get:
      tags: [Projects]
      summary: List projects
      parameters:
        - $ref: '#/components/parameters/IncludeArchived'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectList'
    post:
      tags: [Projects]
      summary: Create project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'

  /api/v1/projects/{projectId}:
    get:
      tags: [Projects]
      summary: Get project
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      tags: [Projects]
      summary: Update project (rename, archive)
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectPatch'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Projects]
      summary: Delete project (optional MVP; prefer archive via PATCH)
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/tasks:
    get:
      tags: [Tasks]
      summary: List tasks
      description: |
        Filter tasks. Use `view` for Today / Next / Later semantics (see PRD). Exact rules are
        implementation-defined but should be documented in server README; recommended defaults:
        - `today`: `focus_bucket=today` OR due date is today
        - `next`: `focus_bucket=next` OR due within 7 days (excluding today bucket)
        - `later`: `focus_bucket=later` OR everything else not in today/next
      parameters:
        - name: project_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/TaskStatus'
        - name: view
          in: query
          schema:
            type: string
            enum: [inbox, today, next, later]
        - name: q
          in: query
          description: Substring match on title (MVP); may extend to description
          schema:
            type: string
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListPage'
    post:
      tags: [Tasks]
      summary: Create task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'

  /api/v1/tasks/{taskId}:
    get:
      tags: [Tasks]
      summary: Get task
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      tags: [Tasks]
      summary: Update task
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskPatch'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Tasks]
      summary: Delete task
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/tasks/{taskId}/tags:
    post:
      tags: [Tags]
      summary: Attach tags to task (idempotent per tag)
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tag_ids]
              properties:
                tag_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        '200':
          description: OK — returns task with tags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: Task or tag not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/tasks/{taskId}/tags/{tagId}:
    delete:
      tags: [Tags]
      summary: Remove tag from task
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - $ref: '#/components/parameters/TagId'
      responses:
        '204':
          description: Removed
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/tags:
    get:
      tags: [Tags]
      summary: List tags
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagListPage'
    post:
      tags: [Tags]
      summary: Create tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
        '409':
          description: Duplicate name for user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/search:
    get:
      tags: [Search]
      summary: Search tasks (title/description per implementation)
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListPage'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TagId:
      name: tagId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    Cursor:
      name: cursor
      in: query
      description: Opaque pagination cursor from previous response
      schema:
        type: string
    IncludeArchived:
      name: include_archived
      in: query
      schema:
        type: boolean
        default: false

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
        code:
          type: string
        details:
          type: object
          additionalProperties: true

    RegisterRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
          maxLength: 120

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthTokens:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: Access token lifetime in seconds

    AuthResponse:
      allOf:
        - $ref: '#/components/schemas/AuthTokens'
        - type: object
          properties:
            user:
              $ref: '#/components/schemas/User'

    User:
      type: object
      required: [id, email, name, created_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserPatch:
      type: object
      properties:
        name:
          type: string
          maxLength: 120
        email:
          type: string
          format: email

    Project:
      type: object
      required: [id, name, archived, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 200
        archived:
          type: boolean
        archived_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProjectCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 200

    ProjectPatch:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        archived:
          type: boolean

    ProjectList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Project'

    TaskStatus:
      type: string
      enum: [todo, doing, done]

    TaskPriority:
      type: string
      enum: [low, medium, high]

    FocusBucket:
      type: string
      enum: [none, today, next, later]

    Task:
      type: object
      required:
        - id
        - title
        - status
        - focus_bucket
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 10000
          nullable: true
        status:
          $ref: '#/components/schemas/TaskStatus'
        priority:
          type: string
          nullable: true
          enum: [low, medium, high]
        due_date:
          type: string
          format: date
          nullable: true
        focus_bucket:
          $ref: '#/components/schemas/FocusBucket'
        project_id:
          type: string
          format: uuid
          nullable: true
        assignee_id:
          type: string
          format: uuid
          nullable: true
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TaskCreate:
      type: object
      required: [title]
      properties:
        title:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 10000
        status:
          $ref: '#/components/schemas/TaskStatus'
        priority:
          $ref: '#/components/schemas/TaskPriority'
        due_date:
          type: string
          format: date
        focus_bucket:
          $ref: '#/components/schemas/FocusBucket'
        project_id:
          type: string
          format: uuid
        assignee_id:
          type: string
          format: uuid
        tag_ids:
          type: array
          items:
            type: string
            format: uuid

    TaskPatch:
      type: object
      properties:
        title:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 10000
          nullable: true
        status:
          $ref: '#/components/schemas/TaskStatus'
        priority:
          type: string
          nullable: true
          enum: [low, medium, high]
        due_date:
          type: string
          format: date
          nullable: true
        focus_bucket:
          $ref: '#/components/schemas/FocusBucket'
        project_id:
          type: string
          format: uuid
          nullable: true
        assignee_id:
          type: string
          format: uuid
          nullable: true

    TaskListPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        next_cursor:
          type: string
          nullable: true

    Tag:
      type: object
      required: [id, name, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 64
        created_at:
          type: string
          format: date-time

    TagCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 64

    TagListPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        next_cursor:
          type: string
          nullable: true
